<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Bistro</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{background:#f8f8f8;color:#333;}
        header{background:#8B4513;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:20px 10%;}
        .logo{font-size:28px;font-weight:bold;}
        nav a{color:#fff;text-decoration:none;margin-left:20px;}
        nav a:hover{color:#FFD700;}
        .hero{text-align:center;padding:100px 20px;}
        .hero h1{font-size:48px;margin-bottom:20px;}
        .hero p{font-size:18px;max-width:600px;margin:0 auto 30px;}
        .button{display:inline-block;background:#8B4513;color:#fff;text-decoration:none;padding:12px 25px;border-radius:5px;margin:10px;}
        .button:hover{background:#A0522D;}
        footer{background:#8B4513;color:#fff;text-align:center;padding:20px;margin-top:80px;}
    </style>
</head>
<body>
<header>
<div class="logo">Sunset Bistro</div>
<nav>
<a href="#">Home</a>
<a href="#">Menu</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>
<section class="hero">
<h1>Welcome to Sunset Bistro</h1>
<p>Experience delicious meals made with fresh ingredients in a warm and relaxing atmosphere. Every visit is a memorable one.</p>
<a href="#" class="button">View Menu</a>

<footer><p>&copy; 2026 Sunset Bistro. All Rights Reserved.</p></footer>
